services:

  # ── Django backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Optional: Use PostgreSQL instead of SQLite
      # DATABASE_URL=postgresql://user:pass@db:5432/sonata
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db/sonata.db}
      # Optional: override auto-generated SECRET_KEY
      # - SECRET_KEY=${SECRET_KEY:-}
    volumes:
      - music_data:/music
      - db_data:/app/db
      - media_data:/app/media
      # Persist settings (including auto-generated keys)
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/rest/ping?u=x&p=x&v=1.16.1&c=health&f=json"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx reverse proxy & frontend hosting ──────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html/app:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  music_data:
    driver: local
  db_data:
    driver: local
  media_data:
    driver: local
