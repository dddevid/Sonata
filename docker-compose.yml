services:

  # ── Django backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db/sonata.db}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - SCANNER_URL=http://scanner:4040
      - SCANNER_SECRET=${SCANNER_SECRET:-scanner-secret-change-me}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - music_data:/music
      - db_data:/app/db
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - scanner
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/rest/ping?u=x&p=x&v=1.16.1&c=health&f=json"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Go scanner service ──────────────────────────────────────────────────────
  scanner:
    build:
      context: ./scanner
      dockerfile: Dockerfile
    environment:
      - DJANGO_URL=http://backend:8000
      - SCANNER_SECRET=${SCANNER_SECRET:-scanner-secret-change-me}
      - SCANNER_PORT=4040
    volumes:
      - music_data:/music:ro
    ports:
      - "4040:4040"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4040/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx reverse proxy & frontend hosting ──────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html/app:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  music_data:
    driver: local
  db_data:
    driver: local
  media_data:
    driver: local
